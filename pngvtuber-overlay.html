<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNGvtuber Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }

  /* ── Overlay container: draggable + resizable ── */
  #overlay {
    position: fixed;
    width: 320px;
    height: 320px;
    cursor: grab;
    user-select: none;
    z-index: 9999;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  #overlay.dragging { cursor: grabbing; }

  /* PNG display */
  #png-display {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
    image-rendering: pixelated;
    transition: opacity 0.04s ease;
  }

  /* Resize handle — bottom-right corner */
  #resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 18px;
    height: 18px;
    cursor: se-resize;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 10;
  }

  #overlay:hover #resize-handle { opacity: 1; }

  #resize-handle::before {
    content: '';
    position: absolute;
    bottom: 3px;
    right: 3px;
    width: 10px;
    height: 10px;
    border-right: 2px solid rgba(255,255,255,0.7);
    border-bottom: 2px solid rgba(255,255,255,0.7);
  }

  /* ── Control Panel (toggle with C) ── */
  #control-panel {
    position: fixed;
    top: 12px;
    left: 12px;
    background: rgba(10, 10, 15, 0.92);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 14px 16px;
    color: #e8e8f0;
    font-size: 12px;
    min-width: 240px;
    backdrop-filter: blur(12px);
    z-index: 99999;
    transition: opacity 0.2s, transform 0.2s;
  }

  #control-panel.hidden {
    opacity: 0;
    pointer-events: none;
    transform: translateY(-6px);
  }

  #control-panel h2 {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    color: #fff;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #control-panel h2 span.dot {
    display: inline-block;
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #6ee86e;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .folder-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }

  .folder-row label { color: #aaa; font-size: 11px; white-space: nowrap; }

  #folder-btn {
    flex: 1;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 5px;
    color: #ddd;
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    text-align: left;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: background 0.15s;
  }

  #folder-btn:hover { background: rgba(255,255,255,0.13); }

  #file-input { display: none; }

  .key-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    margin-bottom: 10px;
  }

  .key-chip {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    text-align: center;
    padding: 3px 2px;
    font-size: 10px;
    color: #888;
    transition: all 0.08s;
    font-family: monospace;
  }

  .key-chip.loaded { color: #bbb; border-color: rgba(110,232,110,0.3); background: rgba(110,232,110,0.07); }
  .key-chip.active { color: #6ee86e; border-color: #6ee86e; background: rgba(110,232,110,0.18); transform: scale(0.93); }

  .hint {
    color: #555;
    font-size: 10px;
    line-height: 1.5;
    border-top: 1px solid rgba(255,255,255,0.07);
    padding-top: 8px;
    margin-top: 2px;
  }

  .hint kbd {
    background: rgba(255,255,255,0.1);
    border-radius: 3px;
    padding: 1px 4px;
    font-size: 10px;
    font-family: monospace;
    color: #ccc;
  }

  /* Status bar */
  #status {
    color: #666;
    font-size: 10px;
    margin-bottom: 8px;
    font-style: italic;
  }

  #status.ok { color: #6ee86e; font-style: normal; }
  #status.warn { color: #e8b86e; font-style: normal; }
</style>
</head>
<body>

<!-- Control Panel -->
<div id="control-panel">
  <h2><span class="dot"></span> PNGvtuber Overlay</h2>
  <div id="status">No images loaded — select your pics folder</div>

  <div class="folder-row">
    <label>Pics folder:</label>
    <button id="folder-btn" onclick="document.getElementById('file-input').click()">📁 Choose folder…</button>
    <input type="file" id="file-input" multiple accept="image/png,image/gif,image/webp">
  </div>

  <div class="key-grid" id="key-grid">
    <!-- filled by JS -->
  </div>

  <div class="hint">
    <kbd>C</kbd> hide/show this panel &nbsp;·&nbsp; Drag PNG to move &nbsp;·&nbsp; ↘ corner to resize
  </div>
</div>

<!-- The actual PNG overlay -->
<div id="overlay">
  <img id="png-display" src="" alt="">
  <div id="resize-handle"></div>
</div>

<script>
const KEYS = ['1','2','3','4','q','w','e','r','a','s','d','f',' '];
const KEY_LABELS = { ' ': 'SPC' };
const KEY_MAP = {
  '1': 'press1', '2': 'press2', '3': 'press3', '4': 'press4',
  'q': 'pressQ', 'w': 'pressW', 'e': 'pressE', 'r': 'pressR',
  'a': 'pressA', 's': 'pressS', 'd': 'pressD', 'f': 'pressF',
  ' ': 'pressSpace'
};

const images = {}; // name → object URL
let baseImg = null;
let activeKey = null;
let releaseTimer = null;

const display = document.getElementById('png-display');
const panel = document.getElementById('control-panel');
const status = document.getElementById('status');
const keyGrid = document.getElementById('key-grid');
const overlay = document.getElementById('overlay');

// ── Build key grid ──
const chips = {};
KEYS.forEach(k => {
  const el = document.createElement('div');
  el.className = 'key-chip';
  el.id = 'chip-' + k;
  el.textContent = KEY_LABELS[k] || k.toUpperCase();
  el.title = KEY_MAP[k] + '.png';
  keyGrid.appendChild(el);
  chips[k] = el;
});

// ── File loader ──
document.getElementById('file-input').addEventListener('change', (e) => {
  const files = Array.from(e.target.files);
  let loaded = 0;

  // Revoke old URLs
  Object.values(images).forEach(URL.revokeObjectURL);
  Object.keys(images).forEach(k => delete images[k]);
  baseImg = null;

  files.forEach(file => {
    const nameNoExt = file.name.replace(/\.[^.]+$/, '').toLowerCase();
    const url = URL.createObjectURL(file);

    if (nameNoExt === 'base') {
      baseImg = url;
      images['base'] = url;
      loaded++;
    }

    KEYS.forEach(k => {
      if (nameNoExt === KEY_MAP[k].toLowerCase()) {
        images[k] = url;
        chips[k].classList.add('loaded');
        loaded++;
      }
    });
  });

  if (baseImg) {
    display.src = baseImg;
    status.textContent = `✓ Loaded ${loaded} images`;
    status.className = 'ok';
    const btn = document.getElementById('folder-btn');
    btn.textContent = '✓ ' + files[0].webkitRelativePath.split('/')[0] || 'folder loaded';
  } else {
    status.textContent = '⚠ No base.png found in selection';
    status.className = 'warn';
  }
});

// ── Key handling ──
function setKey(k) {
  if (!baseImg) return;
  if (releaseTimer) clearTimeout(releaseTimer);

  // Clear previous active chip
  if (activeKey !== null) chips[activeKey]?.classList.remove('active');

  activeKey = k;

  if (k !== null && images[k]) {
    display.src = images[k];
    chips[k].classList.add('active');
  } else {
    display.src = baseImg;
  }
}

const heldKeys = new Set();

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;

  // Toggle panel
  if (e.key.toLowerCase() === 'c' && !e.ctrlKey && !e.metaKey) {
    // Only toggle if not typing in an input
    if (document.activeElement.tagName !== 'INPUT') {
      panel.classList.toggle('hidden');
      return;
    }
  }

  const k = e.key === ' ' ? ' ' : e.key.toLowerCase();
  if (KEYS.includes(k)) {
    e.preventDefault();
    heldKeys.add(k);
    // Use most recently pressed key
    setKey(k);
  }
});

document.addEventListener('keyup', (e) => {
  const k = e.key === ' ' ? ' ' : e.key.toLowerCase();
  heldKeys.delete(k);

  if (heldKeys.size > 0) {
    // Fall back to another held key
    const last = [...heldKeys].at(-1);
    setKey(last);
  } else {
    setKey(null);
  }
});

// ── Drag ──
let dragging = false, dragOffX = 0, dragOffY = 0;

overlay.addEventListener('mousedown', (e) => {
  if (e.target === document.getElementById('resize-handle')) return;
  dragging = true;
  overlay.classList.add('dragging');
  const rect = overlay.getBoundingClientRect();
  dragOffX = e.clientX - rect.left;
  dragOffY = e.clientY - rect.top;
  overlay.style.transform = 'none';
  overlay.style.left = rect.left + 'px';
  overlay.style.top = rect.top + 'px';
  e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
  if (dragging) {
    overlay.style.left = (e.clientX - dragOffX) + 'px';
    overlay.style.top  = (e.clientY - dragOffY) + 'px';
  }
  if (resizing) {
    const newW = Math.max(60, e.clientX - resizeStartX + resizeStartW);
    const newH = Math.max(60, e.clientY - resizeStartY + resizeStartH);
    overlay.style.width  = newW + 'px';
    overlay.style.height = newH + 'px';
  }
});

document.addEventListener('mouseup', () => {
  dragging = false;
  resizing = false;
  overlay.classList.remove('dragging');
});

// ── Resize ──
let resizing = false, resizeStartX, resizeStartY, resizeStartW, resizeStartH;

document.getElementById('resize-handle').addEventListener('mousedown', (e) => {
  resizing = true;
  resizeStartX = e.clientX;
  resizeStartY = e.clientY;
  resizeStartW = overlay.offsetWidth;
  resizeStartH = overlay.offsetHeight;
  e.preventDefault();
  e.stopPropagation();
});
</script>
</body>
</html>
