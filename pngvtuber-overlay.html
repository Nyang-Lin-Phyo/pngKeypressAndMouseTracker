<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNGvtuber Overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
  }

  #overlay {
    position: fixed;
    width: 320px;
    height: 320px;
    user-select: none;
    z-index: 9999;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  #png-stack {
    position: relative;
    width: 100%;
    height: 100%;
  }

  #png-display,
  #mouse-display {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    pointer-events: none;
    image-rendering: pixelated;
  }

  #mouse-display {
    z-index: 2;
    transform: translate(0px, 0px);
  }

  /* ── Status dot (top-right corner, tiny) ── */
  #ws-dot {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #e85a5a;
    z-index: 999999;
    transition: background 0.3s;
    title: "WebSocket disconnected";
  }
  #ws-dot.connected { background: #6ee86e; }
</style>
</head>
<body>

<!-- <div id="ws-dot" title="WebSocket: disconnected"></div> -->

<div id="overlay">
  <div id="png-stack">
    <img id="png-display"   src="" alt="">
    <img id="mouse-display" src="" alt="" style="display:none;">
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────
const WS_URL    = 'ws://localhost:8765';
const PNG_DIR   = './PNGs/';
const MOUSE_RANGE = 20;    // ±px the hand overlay can travel
const RADIUS_X    = 1100;  // increase if hand hits left/right wall too early
const RADIUS_Y    = 800;   // increase if hand hits top/bottom wall too early

// ── Set these to where your mousepad center is on your PHYSICAL screen ────
// How to find them: move your mouse to where the hand should be centered,
// then check the coords printed by server.py — paste those values here.
const MOUSE_CENTER_X = 960;   // absolute screen X of mousepad center
const MOUSE_CENTER_Y = 540;   // absolute screen Y of mousepad center

const KEY_MAP = {
  '1': 'press1', '2': 'press2', '3': 'press3', '4': 'press4',
  'q': 'pressQ', 'w': 'pressW', 'e': 'pressE', 'r': 'pressR',
  'a': 'pressA', 's': 'pressS', 'd': 'pressD', 'f': 'pressF',
  'space': 'pressSpace',
};

// ── Elements ──────────────────────────────────────────────────────────────
const display      = document.getElementById('png-display');
const mouseDisplay = document.getElementById('mouse-display');
// const wsDot        = document.getElementById('ws-dot');
const overlay      = document.getElementById('overlay');

// ── Preload images ────────────────────────────────────────────────────────
const images = {};   // key → img src path
let baseImg  = null;
let mouseImg = null;

function preload(src) {
  return new Promise(resolve => {
    const i = new Image();
    i.onload  = () => resolve(true);
    i.onerror = () => resolve(false);
    i.src = src;
  });
}

async function loadAll() {
  const basePath   = PNG_DIR + 'base.png';
  const mousePath  = PNG_DIR + 'rightHandMouse.png';

  if (await preload(basePath)) {
    baseImg      = basePath;
    display.src  = basePath;
  }

  if (await preload(mousePath)) {
    mouseImg              = mousePath;
    mouseDisplay.src      = mousePath;
    mouseDisplay.style.display = 'block';
  }

  for (const [key, name] of Object.entries(KEY_MAP)) {
    const path = PNG_DIR + name + '.png';
    if (await preload(path)) images[key] = path;
  }
}

loadAll();

// ── Apply state from server ───────────────────────────────────────────────
function applyState({ held_keys, mouse_x, mouse_y }) {
  // Key: use last (most recently pressed) held key
  const activeKey = held_keys.length > 0 ? held_keys[held_keys.length - 1] : null;

  if (activeKey && images[activeKey]) {
    display.src = images[activeKey];
  } else if (baseImg) {
    display.src = baseImg;
  }

  // Mouse hand offset — relative to fixed screen anchor point
  if (mouseImg) {
    const normX = Math.max(-1, Math.min(1, (mouse_x - MOUSE_CENTER_X) / RADIUS_X));
    const normY = Math.max(-1, Math.min(1, (mouse_y - MOUSE_CENTER_Y) / RADIUS_Y));
    mouseDisplay.style.transform =
      `translate(${-normX * MOUSE_RANGE}px, ${-normY * MOUSE_RANGE}px)`;
  }
}

// ── WebSocket with auto-reconnect ─────────────────────────────────────────
let ws = null;

function connect() {
  ws = new WebSocket(WS_URL);

  ws.addEventListener('open', () => {
    wsDot.classList.add('connected');
    wsDot.title = 'WebSocket: connected';
  });

  ws.addEventListener('message', (e) => {
    try {
      applyState(JSON.parse(e.data));
    } catch (_) {}
  });

  ws.addEventListener('close', () => {
    wsDot.classList.remove('connected');
    wsDot.title = 'WebSocket: disconnected — retrying…';
    // Auto-reconnect after 2s
    setTimeout(connect, 2000);
  });

  ws.addEventListener('error', () => {
    ws.close();
  });
}

connect();
</script>
</body>
</html>
